name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/sussdorff/soft-landing-backend
  DASHBOARD_IMAGE: ghcr.io/sussdorff/soft-landing-dashboard
  DOCS_IMAGE: ghcr.io/sussdorff/soft-landing-docs
  LANDING_IMAGE: ghcr.io/sussdorff/soft-landing-landing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for ARM cross-compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard
        uses: docker/build-push-action@v6
        with:
          context: dashboard
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
            ${{ env.DASHBOARD_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push docs
        uses: docker/build-push-action@v6
        with:
          context: docs
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCS_IMAGE }}:${{ github.sha }}
            ${{ env.DOCS_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push landing
        uses: docker/build-push-action@v6
        with:
          context: landing
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.LANDING_IMAGE }}:${{ github.sha }}
            ${{ env.LANDING_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 46.224.137.140 >> ~/.ssh/known_hosts

      - name: Deploy docker-compose.yml and Caddyfile
        run: |
          scp docker-compose.prod.yml root@46.224.137.140:/opt/softlanding/docker-compose.yml
          scp infra/Caddyfile root@46.224.137.140:/opt/softlanding/Caddyfile

      - name: Pull and restart containers
        run: |
          ssh root@46.224.137.140 bash << 'EOF'
          cd /opt/softlanding
          docker compose pull
          docker compose up -d
          EOF

      - name: Verify deployment
        run: |
          sleep 10
          curl -sf https://softlanding.sussdorff.de/ || echo "Health check pending"
          curl -sf https://softlanding.sussdorff.de/dashboard/ || echo "Dashboard pending"
          curl -sf https://softlanding.sussdorff.de/docs/ || echo "Docs pending"
          curl -sf https://get-softlanding.sussdorff.de/ || echo "Landing pending"
