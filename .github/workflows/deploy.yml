name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 46.224.137.140 >> ~/.ssh/known_hosts

      - name: Deploy backend
        run: |
          rsync -avz --delete \
            --exclude '__pycache__' --exclude '.venv' --exclude '*.pyc' \
            backend/ root@46.224.137.140:/opt/softlanding/backend/

          ssh root@46.224.137.140 bash << 'EOF'
          cd /opt/softlanding/backend
          if [ -f pyproject.toml ]; then
            /root/.local/bin/uv sync --python python3.14
            systemctl restart softlanding-backend 2>/dev/null || true
          fi
          EOF

      - name: Deploy dashboard
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' --exclude '.next' \
            dashboard/ root@46.224.137.140:/opt/softlanding/dashboard/

      - name: Deploy passenger app
        run: |
          rsync -avz --delete \
            passenger-app/ root@46.224.137.140:/opt/softlanding/passenger-app/

      - name: Build and deploy docs
        run: |
          pip install -r docs/requirements.txt -q
          mkdocs build -f docs/mkdocs.yml
          rsync -avz --delete docs/site/ root@46.224.137.140:/opt/softlanding/docs/site/

      - name: Verify deployment
        run: |
          curl -sf https://softlanding.sussdorff.de/ || echo "Health check pending"
          curl -sf https://softlanding.sussdorff.de/docs/ || echo "Docs health check pending"
