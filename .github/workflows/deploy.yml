name: Deploy

on:
  push:
    branches: [main]

env:
  SERVER: root@46.224.137.140
  REMOTE_DIR: /opt/softlanding
  BACKEND_IMAGE: ghcr.io/sussdorff/soft-landing-backend:latest
  DASHBOARD_IMAGE: ghcr.io/sussdorff/soft-landing-dashboard:latest
  DOCS_IMAGE: ghcr.io/sussdorff/soft-landing-docs:latest
  LANDING_IMAGE: ghcr.io/sussdorff/soft-landing-landing:latest

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 46.224.137.140 >> ~/.ssh/known_hosts

      - name: Deploy docker-compose.yml
        run: scp docker-compose.prod.yml ${{ env.SERVER }}:${{ env.REMOTE_DIR }}/docker-compose.yml

      - name: Build and push backend
        run: |
          docker buildx build \
            -t ${{ env.BACKEND_IMAGE }} \
            --output type=docker,dest=- \
            backend/ | ssh ${{ env.SERVER }} docker load

      - name: Build and push dashboard
        run: |
          docker buildx build \
            -t ${{ env.DASHBOARD_IMAGE }} \
            --output type=docker,dest=- \
            dashboard/ | ssh ${{ env.SERVER }} docker load

      - name: Build and push docs
        run: |
          docker buildx build \
            -t ${{ env.DOCS_IMAGE }} \
            --output type=docker,dest=- \
            docs/ | ssh ${{ env.SERVER }} docker load

      - name: Build and push landing
        run: |
          docker buildx build \
            -t ${{ env.LANDING_IMAGE }} \
            --output type=docker,dest=- \
            landing/ | ssh ${{ env.SERVER }} docker load

      - name: Restart services
        run: ssh ${{ env.SERVER }} "cd ${{ env.REMOTE_DIR }} && docker compose up -d"

      - name: Verify deployment
        run: |
          sleep 10
          curl -sf https://softlanding.sussdorff.de/ || echo "Health check pending"
          curl -sf https://softlanding.sussdorff.de/dashboard/ || echo "Dashboard pending"
          curl -sf https://softlanding.sussdorff.de/docs/ || echo "Docs pending"
          curl -sf https://get-softlanding.sussdorff.de/ || echo "Landing pending"
