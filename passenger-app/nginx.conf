server {
    listen       80;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;

    # Serve WASM files with correct MIME type
    types {
        application/wasm wasm;
    }

    # SPA rewrite: serve index.html for any path under /passenger-app/
    location /passenger-app/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /passenger-app/index.html;
    }

    # Redirect bare /passenger-app to /passenger-app/
    location = /passenger-app {
        return 301 /passenger-app/;
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
