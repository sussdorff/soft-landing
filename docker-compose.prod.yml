services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: softlanding
      POSTGRES_USER: softlanding
      POSTGRES_PASSWORD: softlanding
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    image: ghcr.io/sussdorff/soft-landing-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://softlanding:softlanding@postgres/softlanding"
    depends_on:
      - postgres

  dashboard:
    image: ghcr.io/sussdorff/soft-landing-dashboard:latest
    restart: unless-stopped

  docs:
    image: ghcr.io/sussdorff/soft-landing-docs:latest
    restart: unless-stopped

  landing:
    image: ghcr.io/sussdorff/soft-landing-landing:latest
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
