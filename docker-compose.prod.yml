services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: softlanding
      POSTGRES_USER: softlanding
      POSTGRES_PASSWORD: softlanding
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    image: ghcr.io/sussdorff/soft-landing-backend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://softlanding:softlanding@postgres/softlanding"
    depends_on:
      - postgres

  dashboard:
    image: ghcr.io/sussdorff/soft-landing-dashboard:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"

  docs:
    image: ghcr.io/sussdorff/soft-landing-docs:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"

  passenger-app:
    image: ghcr.io/sussdorff/soft-landing-passenger-app:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:80"

  landing:
    image: ghcr.io/sussdorff/soft-landing-landing:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:80"

volumes:
  pgdata:
